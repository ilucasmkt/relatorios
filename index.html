<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Meta Ads</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060b18;--card:#0d1424;--card2:#0a1018;--border:#162033;--border2:#1e2d45;
  --input-bg:#111a2e;--text:#d4dced;--dim:#5a6a85;--faint:#2d3a52;
  --blue:#2d7ff9;--green:#0cc98a;--purple:#9061f9;--amber:#f0a030;--red:#f04848;
  --blue-g:rgba(45,127,249,.12);--green-g:rgba(12,201,138,.12);
  --purple-g:rgba(144,97,249,.12);--amber-g:rgba(240,160,48,.12);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(45,127,249,.07),transparent 70%);pointer-events:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes countPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes slideRow{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glowBreathe{0%,100%{box-shadow:0 0 18px var(--gc,rgba(45,127,249,.08))}50%{box-shadow:0 0 38px var(--gc,rgba(45,127,249,.16))}}
@keyframes gradLine{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

.anim{opacity:0;animation:fadeUp .75s cubic-bezier(.16,1,.3,1) forwards}
.wrap{max-width:1060px;margin:0 auto;padding:48px 24px 80px;position:relative;z-index:1}
.wrap-sm{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:700}

.btn{padding:14px 24px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1d5fcc);color:#fff;box-shadow:0 4px 20px rgba(45,127,249,.3)}
.btn-green{background:linear-gradient(135deg,var(--green),#089e6c);color:#fff;box-shadow:0 4px 20px rgba(12,201,138,.3)}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--dim)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700}
.btn-full{width:100%}

input,textarea,select{width:100%;background:var(--input-bg);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,127,249,.12)}
input::placeholder,textarea::placeholder{color:#3d4e68}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px}

.view{display:none}.view.active{display:block}

.rpt-badge{display:inline-block;padding:6px 20px;border-radius:24px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--blue-g),var(--purple-g));border:1px solid rgba(45,127,249,.18);color:#7db4fc;margin-bottom:20px}
.rpt-title{font-family:'Outfit',sans-serif;font-size:clamp(30px,5vw,50px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,#7db4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.kpi{text-align:center;position:relative;overflow:hidden}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:700;margin-bottom:8px}
.kpi-value{font-family:'Outfit',sans-serif;font-size:clamp(26px,4vw,38px);font-weight:900}
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.sec-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800}
.tbl{margin-bottom:32px;overflow:hidden;border-radius:14px;border:1px solid var(--border);background:var(--card)}
.trow{display:grid;grid-template-columns:2.2fr 1fr 1fr .8fr .8fr .8fr .8fr;gap:6px;padding:13px 24px;align-items:center;font-size:13px;min-width:700px}
.thead{background:rgba(0,0,0,.3);font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px}
.trow+.trow{border-top:1px solid rgba(255,255,255,.03)}
.camp-name{font-weight:700;color:#f0f4f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.val-b{color:#7db4fc}.val-g{color:#6ee7b7;font-weight:700}.val-p{color:#c4b5fd;font-weight:600}.val-a{color:#fbbf24}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.bar-track{background:#111a2e;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transform-origin:left;transform:scaleX(0)}
.rpt-notes{white-space:pre-wrap;font-size:14px;line-height:1.7;color:#8d9db5}
.rpt-footer-line{width:60px;height:2px;margin:0 auto 20px;background:linear-gradient(90deg,transparent,var(--blue),transparent);background-size:200% 100%;animation:gradLine 3s linear infinite}

.ed-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,#7db4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.camp-card{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:16px;margin-bottom:12px;position:relative}
.camp-remove{position:absolute;top:10px;right:12px;background:none;border:none;color:#4a2020;font-size:18px;cursor:pointer;font-weight:700}
.camp-remove:hover{color:var(--red)}
.camp-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.preview-bar{background:var(--card2);border:1px solid #111a2e;border-radius:14px;padding:20px;margin-bottom:20px}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center}
.preview-val{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800}

.pw-wrap{max-width:420px;margin:0 auto;padding:100px 20px;text-align:center;position:relative;z-index:1}
.pw-icon{width:80px;height:80px;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:36px;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 8px 32px rgba(45,127,249,.25)}
.pw-title{font-family:'Outfit',sans-serif;font-size:24px;font-weight:900;color:#f0f4f8;margin-bottom:6px}
.pw-error{background:#1a0a0a;border:1px solid #4a1515;border-radius:10px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#f87171;animation:shake .4s ease-out}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:520px;width:100%;text-align:center}
.modal-link{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:12px 14px;font-size:11px;color:#7db4fc;word-break:break-all;margin-bottom:16px;text-align:left;font-family:monospace;line-height:1.5;max-height:80px;overflow-y:auto}
.modal-pw{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:12px 14px;font-size:14px;color:var(--amber);font-weight:700;margin-bottom:16px;font-family:monospace;letter-spacing:1px}
.wpp-msg{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:14px;font-size:13px;color:var(--text);text-align:left;line-height:1.6;margin-bottom:16px;white-space:pre-wrap}

@media(max-width:768px){
  .trow{grid-template-columns:1.5fr .6fr .8fr .8fr}
  .trow>:nth-child(n+5),.thead>:nth-child(n+5){display:none}
  .charts-grid,.sec-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .camp-fields{grid-template-columns:1fr 1fr}
  .preview-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- EDITOR -->
<div id="view-editor" class="view">
  <div class="wrap-sm">
    <div style="text-align:center;margin-bottom:36px">
      <div style="width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px;background:linear-gradient(135deg,var(--blue),var(--purple));box-shadow:0 8px 32px rgba(45,127,249,.25)">📊</div>
      <div class="ed-title">Gerador de Relatório</div>
      <p style="color:var(--dim);font-size:14px">Preencha os dados, gere o link e envie ao cliente</p>
    </div>

    <div class="card">
      <div class="section-label" style="margin-bottom:14px">Informações</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div><label>Nome da Agência</label><input id="ed-agency" placeholder="Ex: Traffic Pro"></div>
        <div><label>Cliente / Conta</label><input id="ed-account" placeholder="Ex: Veículos Premium Motors"></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div><label>Período</label><input id="ed-period" placeholder="Ex: 01/03/2026 – 31/03/2026"></div>
        <div><label>Senha de Acesso (opcional)</label><input id="ed-password" type="text" placeholder="Ex: premium2026"></div>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <span class="section-label">Campanhas</span>
        <button class="btn btn-ghost btn-sm" onclick="addCampaign()">+ Campanha</button>
      </div>
      <div id="camps"></div>
    </div>

    <div class="card">
      <label>Observações para o cliente (opcional)</label>
      <textarea id="ed-notes" placeholder="Ex: Este mês reduzimos o CPL em 12% com a nova segmentação..."></textarea>
    </div>

    <div class="preview-bar" id="preview" style="display:none">
      <div class="section-label" style="margin-bottom:12px">Preview dos Totais</div>
      <div class="preview-grid">
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">Investimento</div><div class="preview-val" style="color:var(--blue)" id="pv-s">R$ 0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">Leads</div><div class="preview-val" style="color:var(--green)" id="pv-l">0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">CPL</div><div class="preview-val" style="color:var(--purple)" id="pv-c">R$ 0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">CTR</div><div class="preview-val" style="color:var(--amber)" id="pv-t">0%</div></div>
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="font-size:16px;padding:16px" onclick="generateLink()">🔗 Gerar Link do Relatório</button>
  </div>
</div>

<!-- PASSWORD -->
<div id="view-password" class="view">
  <div class="pw-wrap">
    <div class="pw-icon">🔒</div>
    <div class="pw-title">Relatório Protegido</div>
    <p style="color:var(--dim);font-size:14px;margin-bottom:24px" id="pw-sub">Digite a senha para acessar</p>
    <div id="pw-err" style="display:none" class="pw-error"></div>
    <input id="pw-in" type="password" placeholder="Senha de acesso" style="margin-bottom:14px;text-align:center;font-size:16px;padding:14px" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn btn-primary btn-full" style="font-size:15px" onclick="checkPw()">Acessar Relatório</button>
  </div>
</div>

<!-- REPORT -->
<div id="view-report" class="view">
  <div class="wrap" id="rpt"></div>
</div>

<!-- MODAL -->
<div id="modal" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:36px;margin-bottom:12px">✅</div>
    <h2 style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:#f0f4f8;margin-bottom:4px">Relatório Gerado!</h2>
    <p style="font-size:13px;color:var(--dim);margin-bottom:20px">Copie o link e envie ao cliente</p>
    <div style="text-align:left;margin-bottom:6px"><label>Link do relatório</label></div>
    <div class="modal-link" id="m-link"></div>
    <button class="btn btn-primary btn-full btn-sm" style="margin-bottom:16px" onclick="copyEl('m-link',this)">📋 Copiar Link</button>
    <div id="m-pw-sec">
      <div style="text-align:left;margin-bottom:6px"><label>Senha</label></div>
      <div class="modal-pw" id="m-pw"></div>
    </div>
    <div style="text-align:left;margin:16px 0 6px"><label>Mensagem pronta para WhatsApp</label></div>
    <div class="wpp-msg" id="m-wpp"></div>
    <button class="btn btn-green btn-full" style="font-size:14px" onclick="copyEl('m-wpp',this)">📋 Copiar Mensagem</button>
    <button class="btn btn-ghost btn-full" style="margin-top:12px" onclick="closeModal()">Fechar e Criar Outro</button>
  </div>
</div>

<script>
const fmt=v=>`R$ ${Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtN=v=>Number(v||0).toLocaleString("pt-BR");
const fmtP=v=>`${Number(v||0).toFixed(2)}%`;
const esc=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function totals(d){
  const t=d.reduce((a,c)=>({sp:a.sp+(Number(c.s)||0),im:a.im+(Number(c.i)||0),cl:a.cl+(Number(c.k)||0),le:a.le+(Number(c.l)||0)}),{sp:0,im:0,cl:0,le:0});
  t.cpl=t.le>0?t.sp/t.le:0;t.ctr=t.im>0?(t.cl/t.im)*100:0;t.cpc=t.cl>0?t.sp/t.cl:0;return t;
}
function enrich(d){
  return d.map(c=>{const s=Number(c.s)||0,i=Number(c.i)||0,k=Number(c.k)||0,l=Number(c.l)||0;return{name:c.n,spend:s,impressions:i,clicks:k,leads:l,cpl:l>0?s/l:0,ctr:i>0?(k/i)*100:0,cpc:k>0?s/k:0}});
}
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById('view-'+id).classList.add('active')}
function encode(o){return btoa(unescape(encodeURIComponent(JSON.stringify(o))))}
function decode(s){try{return JSON.parse(decodeURIComponent(escape(atob(s))))}catch(e){return null}}

// ─── Editor ───
let cc=0;
function addCampaign(d){
  const x=cc++,div=document.createElement('div');div.className='camp-card';div.id='c'+x;
  div.innerHTML=`<button class="camp-remove" onclick="remCamp(${x})">×</button>
    <div><label>Nome da Campanha</label><input id="cn${x}" value="${esc(d?.n)}" placeholder="Ex: Seminovos – Leads WhatsApp" oninput="updPrev()"></div>
    <div class="camp-fields">
      <div><label>Investido (R$)</label><input type="number" step="0.01" id="cs${x}" value="${d?.s||''}" placeholder="0.00" oninput="updPrev()"></div>
      <div><label>Impressões</label><input type="number" id="ci${x}" value="${d?.i||''}" placeholder="0" oninput="updPrev()"></div>
      <div><label>Cliques</label><input type="number" id="ck${x}" value="${d?.k||''}" placeholder="0" oninput="updPrev()"></div>
      <div><label>Leads</label><input type="number" id="cl${x}" value="${d?.l||''}" placeholder="0" oninput="updPrev()"></div>
    </div>`;
  document.getElementById('camps').appendChild(div);
}
function remCamp(x){if(document.querySelectorAll('.camp-card').length>1)document.getElementById('c'+x)?.remove();updPrev()}
function getCamps(){
  const out=[];document.querySelectorAll('.camp-card').forEach(card=>{
    const id=card.id.slice(1),n=document.getElementById('cn'+id)?.value?.trim();
    if(n)out.push({n,s:Number(document.getElementById('cs'+id)?.value)||0,i:Number(document.getElementById('ci'+id)?.value)||0,k:Number(document.getElementById('ck'+id)?.value)||0,l:Number(document.getElementById('cl'+id)?.value)||0});
  });return out;
}
function updPrev(){
  const c=getCamps(),bar=document.getElementById('preview');
  if(!c.length){bar.style.display='none';return}bar.style.display='block';
  const t=totals(c);
  document.getElementById('pv-s').textContent=fmt(t.sp);document.getElementById('pv-l').textContent=t.le;
  document.getElementById('pv-c').textContent=fmt(t.cpl);document.getElementById('pv-t').textContent=fmtP(t.ctr);
}

function generateLink(){
  const acct=document.getElementById('ed-account').value.trim();
  if(!acct){alert('Preencha o nome do cliente.');return}
  const camps=getCamps();if(!camps.length){alert('Preencha pelo menos uma campanha.');return}
  const data={a:document.getElementById('ed-agency').value.trim(),c:acct,p:document.getElementById('ed-period').value.trim(),w:document.getElementById('ed-password').value.trim(),n:document.getElementById('ed-notes').value.trim(),d:camps};
  const link=location.origin+location.pathname+'#r='+encode(data);
  document.getElementById('m-link').textContent=link;
  const pw=data.w;
  document.getElementById('m-pw-sec').style.display=pw?'block':'none';
  if(pw)document.getElementById('m-pw').textContent=pw;
  document.getElementById('m-wpp').textContent=`Olá! Segue o relatório de performance dos seus anúncios 📊\n\n🔗 Link: ${link}${pw?'\n\n🔑 Senha: '+pw:''}\n\nQualquer dúvida estou à disposição!`;
  document.getElementById('modal').style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}
function copyEl(id,btn){navigator.clipboard.writeText(document.getElementById(id).textContent);const o=btn.textContent;btn.textContent='✅ Copiado!';setTimeout(()=>btn.textContent=o,2000)}

// ─── Password ───
let pending=null;
function showPw(r){pending=r;document.getElementById('pw-sub').textContent='Relatório de '+r.c;document.getElementById('pw-in').value='';document.getElementById('pw-err').style.display='none';showView('password');setTimeout(()=>document.getElementById('pw-in').focus(),100)}
function checkPw(){
  if(document.getElementById('pw-in').value===pending.w){renderReport(pending);return}
  const e=document.getElementById('pw-err');e.textContent='Senha incorreta. Tente novamente.';e.style.display='block';e.style.animation='none';e.offsetHeight;e.style.animation='shake .4s ease-out';
}

// ─── Report ───
function renderReport(r){
  const camps=enrich(r.d),t=totals(r.d);
  const mxL=Math.max(...camps.map(c=>c.leads),1),mxC=Math.max(...camps.map(c=>c.cpl),.01);
  const kpis=[
    {l:"Investimento",v:fmt(t.sp),c:"var(--blue)",g:"var(--blue-g)"},
    {l:"Leads Gerados",v:t.le,c:"var(--green)",g:"var(--green-g)"},
    {l:"Custo por Lead",v:fmt(t.cpl),c:"var(--purple)",g:"var(--purple-g)"},
    {l:"CTR",v:fmtP(t.ctr),c:"var(--amber)",g:"var(--amber-g)"},
  ];
  document.getElementById('rpt').innerHTML=`
    <div class="anim" style="text-align:center;margin-bottom:52px;animation-delay:.1s">
      <div class="rpt-badge">Relatório de Performance</div>
      <div class="rpt-title">Meta Ads</div>
      <div style="font-size:17px;color:#7d8faa;font-weight:500">${esc(r.c)}</div>
      <div style="font-size:13px;color:var(--dim);margin-top:4px">${esc(r.p)}</div>
      ${r.a?`<div style="font-size:12px;color:var(--faint);margin-top:16px">Gerado por <span style="color:var(--blue);font-weight:700">${esc(r.a)}</span></div>`:''}
    </div>
    <div class="kpi-grid">${kpis.map((k,i)=>`
      <div class="card kpi" style="text-align:center;--gc:${k.g};animation:fadeUp .75s cubic-bezier(.16,1,.3,1) ${.2+i*.1}s forwards,glowBreathe 4s ease-in-out infinite;opacity:0">
        <div class="kpi-label">${k.l}</div>
        <div class="kpi-value" style="color:${k.c};animation:countPop .5s cubic-bezier(.16,1,.3,1) ${.5+i*.1}s both;opacity:0">${k.v}</div>
      </div>`).join('')}</div>
    <div class="sec-grid">${[{l:"Impressões",v:fmtN(t.im)},{l:"Cliques",v:fmtN(t.cl)},{l:"CPC Médio",v:fmt(t.cpc)}].map((m,i)=>`
      <div class="card anim" style="text-align:center;padding:20px;animation-delay:${.6+i*.08}s">
        <div class="section-label" style="margin-bottom:6px">${m.l}</div>
        <div class="sec-val">${m.v}</div>
      </div>`).join('')}</div>
    <div class="tbl anim" style="animation-delay:.8s">
      <div style="padding:20px 24px 8px" class="section-label">Performance por Campanha</div>
      <div style="overflow-x:auto">
        <div class="trow thead"><span>Campanha</span><span>Investido</span><span>Impressões</span><span>Cliques</span><span>CTR</span><span>Leads</span><span>CPL</span></div>
        ${camps.map((c,i)=>`<div class="trow" style="animation:slideRow .5s ease-out ${.9+i*.12}s both;opacity:0">
          <span class="camp-name">${esc(c.name)}</span><span class="val-b">${fmt(c.spend)}</span><span>${fmtN(c.impressions)}</span><span>${fmtN(c.clicks)}</span><span class="val-a">${fmtP(c.ctr)}</span><span class="val-g">${c.leads}</span><span class="val-p">${fmt(c.cpl)}</span>
        </div>`).join('')}
      </div>
    </div>
    <div class="charts-grid">
      <div class="card anim" style="animation-delay:1.1s">
        <div class="section-label" style="margin-bottom:18px">Leads por Campanha</div>
        ${camps.map((c,i)=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${esc(c.name)}</span><span style="font-weight:700;color:var(--green)">${c.leads}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c.leads/mxL*100).toFixed(1)}%;background:linear-gradient(90deg,var(--green),rgba(12,201,138,.4));animation:barGrow 1s cubic-bezier(.16,1,.3,1) ${1.2+i*.15}s forwards"></div></div>
        </div>`).join('')}
      </div>
      <div class="card anim" style="animation-delay:1.2s">
        <div class="section-label" style="margin-bottom:18px">CPL por Campanha</div>
        ${camps.map((c,i)=>`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px"><span style="color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%">${esc(c.name)}</span><span style="font-weight:700;color:var(--purple)">${fmt(c.cpl)}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(c.cpl/mxC*100).toFixed(1)}%;background:linear-gradient(90deg,var(--purple),rgba(144,97,249,.4));animation:barGrow 1s cubic-bezier(.16,1,.3,1) ${1.4+i*.15}s forwards"></div></div>
        </div>`).join('')}
      </div>
    </div>
    ${r.n?`<div class="card anim" style="animation-delay:1.5s"><div class="section-label" style="margin-bottom:12px">Observações</div><div class="rpt-notes">${esc(r.n)}</div></div>`:''}
    <div class="anim" style="text-align:center;margin-top:56px;animation-delay:1.6s">
      <div class="rpt-footer-line"></div>
      <p style="font-size:12px;color:var(--faint)">Relatório gerado por <span style="color:var(--blue);font-weight:700">${esc(r.a||'Sua Agência')}</span></p>
      <p style="font-size:11px;color:#1e2940;margin-top:4px">Dados de Meta Ads • ${esc(r.p)}</p>
    </div>`;
  showView('report');
}

// ─── Init ───
(function(){
  const h=location.hash;
  if(h.startsWith('#r=')){const r=decode(h.slice(3));if(r){if(r.w){showPw(r)}else{renderReport(r)}return}}
  addCampaign();showView('editor');
})();
</script>
</body>
</html>
