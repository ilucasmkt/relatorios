<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório Meta Ads</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Outfit:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060b18;--card:#0d1424;--card2:#0a1018;--border:#162033;--border2:#1e2d45;
  --input-bg:#111a2e;--text:#d4dced;--dim:#5a6a85;--faint:#2d3a52;
  --blue:#2d7ff9;--green:#0cc98a;--purple:#9061f9;--amber:#f0a030;--red:#f04848;
  --blue-g:rgba(45,127,249,.12);--green-g:rgba(12,201,138,.12);--purple-g:rgba(144,97,249,.12);--amber-g:rgba(240,160,48,.12);
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(45,127,249,.07),transparent 70%);pointer-events:none}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(36px)}to{opacity:1;transform:translateY(0)}}
@keyframes countPop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes slideRow{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes glowBreathe{0%,100%{box-shadow:0 0 18px var(--gc,rgba(45,127,249,.08))}50%{box-shadow:0 0 38px var(--gc,rgba(45,127,249,.16))}}
@keyframes gradLine{0%{background-position:-200% 0}100%{background-position:200% 0}}
.anim{opacity:0;animation:fadeUp .75s cubic-bezier(.16,1,.3,1) forwards}

/* Shared */
.wrap{max-width:1060px;margin:0 auto;padding:48px 24px 80px;position:relative;z-index:1}
.wrap-sm{max-width:800px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
.wrap-xs{max-width:560px;margin:0 auto;padding:48px 20px;position:relative;z-index:1}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:16px}
.section-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:700}
.btn{padding:14px 24px;border:none;border-radius:12px;font-weight:800;font-size:14px;cursor:pointer;font-family:inherit;letter-spacing:.5px;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--blue),#1d5fcc);color:#fff;box-shadow:0 4px 20px rgba(45,127,249,.3)}
.btn-green{background:linear-gradient(135deg,var(--green),#089e6c);color:#fff;box-shadow:0 4px 20px rgba(12,201,138,.3)}
.btn-ghost{background:var(--card);border:1px solid var(--border);color:var(--dim)}
.btn-ghost:hover{background:var(--border);color:var(--text)}
.btn-sm{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700}
.btn-full{width:100%}
input,textarea,select{width:100%;background:var(--input-bg);border:1px solid var(--border2);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px;outline:none;font-family:inherit;box-sizing:border-box}
input:focus,textarea:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(45,127,249,.12)}
input::placeholder,textarea::placeholder{color:#3d4e68}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:10px;font-weight:700;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:1.5px}

/* Views */
.view{display:none}.view.active{display:block}

/* Report View */
.rpt-header{text-align:center;margin-bottom:52px}
.rpt-badge{display:inline-block;padding:6px 20px;border-radius:24px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--blue-g),var(--purple-g));border:1px solid rgba(45,127,249,.18);color:#7db4fc;margin-bottom:20px}
.rpt-title{font-family:'Outfit',sans-serif;font-size:clamp(30px,5vw,50px);font-weight:900;letter-spacing:-.02em;background:linear-gradient(135deg,#fff 30%,#7db4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:8px}
.rpt-account{font-size:17px;color:#7d8faa;font-weight:500}
.rpt-period{font-size:13px;color:var(--dim);margin-top:4px}
.rpt-agency{font-size:12px;color:var(--faint);margin-top:16px}
.rpt-agency span{color:var(--blue);font-weight:700}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
.kpi{text-align:center;position:relative;overflow:hidden}
.kpi-label{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);font-weight:700;margin-bottom:8px}
.kpi-value{font-family:'Outfit',sans-serif;font-size:clamp(26px,4vw,38px);font-weight:900}
.sec-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:32px}
.sec{text-align:center;padding:20px}
.sec-val{font-family:'Outfit',sans-serif;font-size:22px;font-weight:800}
.tbl{margin-bottom:32px;overflow:hidden;border-radius:14px;border:1px solid var(--border);background:var(--card)}
.tbl-title{padding:20px 24px 8px}
.tbl-inner{overflow-x:auto}
.trow{display:grid;grid-template-columns:2.2fr 1fr 1fr .8fr .8fr .8fr .8fr;gap:6px;padding:13px 24px;align-items:center;font-size:13px;min-width:700px}
.thead{background:rgba(0,0,0,.3);font-size:10px;font-weight:800;color:var(--dim);text-transform:uppercase;letter-spacing:1.2px}
.trow+.trow{border-top:1px solid rgba(255,255,255,.03)}
.camp-name{font-weight:700;color:#f0f4f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.val-b{color:#7db4fc}.val-g{color:#6ee7b7;font-weight:700}.val-p{color:#c4b5fd;font-weight:600}.val-a{color:#fbbf24}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.bar-sec{margin-bottom:14px}
.bar-hd{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px}
.bar-lbl{color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:60%}
.bar-track{background:#111a2e;border-radius:6px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:6px;transform-origin:left;transform:scaleX(0)}
.rpt-notes{white-space:pre-wrap;font-size:14px;line-height:1.7;color:#8d9db5}
.rpt-footer{text-align:center;margin-top:56px}
.rpt-footer-line{width:60px;height:2px;margin:0 auto 20px;background:linear-gradient(90deg,transparent,var(--blue),transparent);background-size:200% 100%;animation:gradLine 3s linear infinite}

/* List View */
.list-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:36}
.list-title{font-family:'Outfit',sans-serif;font-size:30px;font-weight:900;background:linear-gradient(135deg,#fff,#7db4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.list-sub{color:var(--dim);font-size:13px;margin-top:4px}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
.list-info{min-width:0;flex:1}
.list-name{font-weight:700;font-size:15px;color:#f0f4f8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.list-meta{font-size:12px;color:var(--dim);margin-top:2px}
.list-actions{display:flex;gap:6px;flex-shrink:0}
.empty-state{text-align:center;padding:60px 20px;background:var(--card);border:1px solid var(--border);border-radius:16px}

/* Editor */
.ed-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;background:linear-gradient(135deg,#fff,#7db4fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.ed-sub{color:var(--dim);font-size:14px;margin-bottom:32px}
.camp-card{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:16px;margin-bottom:12px;position:relative}
.camp-remove{position:absolute;top:10px;right:12px;background:none;border:none;color:#4a2020;font-size:16px;cursor:pointer;font-weight:700}
.camp-fields{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:10px}
.preview-bar{background:var(--card2);border:1px solid #111a2e;border-radius:14px;padding:20px;margin-bottom:20px}
.preview-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;text-align:center}
.preview-val{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:999;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;max-width:480px;width:100%;text-align:center}
.modal-link{background:var(--card2);border:1px solid #111a2e;border-radius:10px;padding:12px 14px;font-size:12px;color:#7db4fc;word-break:break-all;margin-bottom:16px;text-align:left;font-family:monospace}

/* Responsive */
@media(max-width:768px){
  .trow{grid-template-columns:1.5fr .6fr .8fr .8fr}
  .trow>:nth-child(n+5),.thead>:nth-child(n+5){display:none}
  .charts-grid,.sec-grid{grid-template-columns:1fr}
  .kpi-grid{grid-template-columns:1fr 1fr}
  .camp-fields{grid-template-columns:1fr 1fr}
  .preview-grid{grid-template-columns:1fr 1fr}
  .list-item{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>

<!-- ═══ LIST VIEW ═══ -->
<div id="view-list" class="view">
  <div class="wrap-sm">
    <div class="list-hd">
      <div>
        <div class="list-title">Relatórios</div>
        <div class="list-sub" id="list-count"></div>
      </div>
      <button class="btn btn-primary" onclick="showEditor()">+ Novo Relatório</button>
    </div>
    <div id="list-items"></div>
  </div>
</div>

<!-- ═══ EDITOR VIEW ═══ -->
<div id="view-editor" class="view">
  <div class="wrap-sm">
    <button class="btn btn-ghost btn-sm" onclick="showList()" style="margin-bottom:20px">← Voltar aos relatórios</button>
    <div class="ed-title" id="ed-title">Novo Relatório</div>
    <div class="ed-sub">Preencha os dados e gere o link para o cliente</div>

    <div class="card">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">
        <div><label>Nome da Agência</label><input id="ed-agency" placeholder="Ex: Traffic Pro"></div>
        <div><label>Cliente / Conta</label><input id="ed-account" placeholder="Ex: Veículos Premium Motors"></div>
      </div>
      <div><label>Período</label><input id="ed-period" placeholder="Ex: 01/03/2026 – 31/03/2026"></div>
    </div>

    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
        <span class="section-label">Campanhas</span>
        <button class="btn btn-ghost btn-sm" onclick="addCampaignField()">+ Campanha</button>
      </div>
      <div id="campaigns-container"></div>
    </div>

    <div class="card">
      <label>Observações para o cliente (opcional)</label>
      <textarea id="ed-notes" placeholder="Ex: Este mês reduzimos o CPL em 12% com a nova segmentação..."></textarea>
    </div>

    <div class="preview-bar" id="preview-bar" style="display:none">
      <div class="section-label" style="margin-bottom:12px">Preview dos Totais</div>
      <div class="preview-grid">
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">Investimento</div><div class="preview-val" style="color:var(--blue)" id="pv-spend">R$ 0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">Leads</div><div class="preview-val" style="color:var(--green)" id="pv-leads">0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">CPL</div><div class="preview-val" style="color:var(--purple)" id="pv-cpl">R$ 0</div></div>
        <div><div style="font-size:10px;color:var(--dim);margin-bottom:3px">CTR</div><div class="preview-val" style="color:var(--amber)" id="pv-ctr">0%</div></div>
      </div>
    </div>

    <button class="btn btn-primary btn-full" style="font-size:16px;padding:16px" onclick="saveReport()">🔗 Salvar e Gerar Link</button>
  </div>
</div>

<!-- ═══ REPORT VIEW ═══ -->
<div id="view-report" class="view">
  <div class="wrap" id="report-content"></div>
</div>

<!-- ═══ MODAL ═══ -->
<div id="share-modal" class="modal-overlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div style="font-size:36px;margin-bottom:12px">🔗</div>
    <h2 style="font-family:'Outfit',sans-serif;font-size:20px;font-weight:800;color:#f0f4f8;margin-bottom:8px">Link do Relatório</h2>
    <p style="font-size:13px;color:var(--dim);margin-bottom:20px">Envie este link para o cliente — ele abre o relatório animado direto no navegador</p>
    <div class="modal-link" id="modal-link"></div>
    <button class="btn btn-green btn-full" style="font-size:15px" onclick="copyLink()" id="copy-btn">📋 Copiar Link</button>
    <button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="closeModal()">Fechar</button>
  </div>
</div>

<script>
// ─── State ───
let reports = [];
let editingId = null;
let campaignCount = 0;
const fmt = v => `R$ ${Number(v||0).toLocaleString("pt-BR",{minimumFractionDigits:2,maximumFractionDigits:2})}`;
const fmtN = v => Number(v||0).toLocaleString("pt-BR");
const fmtP = v => `${Number(v||0).toFixed(2)}%`;
const uid = () => Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4);

function computeTotals(camps) {
  const t = camps.reduce((a,c) => ({
    spend:a.spend+(Number(c.spend)||0), impressions:a.impressions+(Number(c.impressions)||0),
    clicks:a.clicks+(Number(c.clicks)||0), leads:a.leads+(Number(c.leads)||0)
  }), {spend:0,impressions:0,clicks:0,leads:0});
  t.cpl = t.leads>0 ? t.spend/t.leads : 0;
  t.ctr = t.impressions>0 ? (t.clicks/t.impressions)*100 : 0;
  t.cpc = t.clicks>0 ? t.spend/t.clicks : 0;
  return t;
}

function enrichCamps(camps) {
  return camps.map(c => {
    const spend=Number(c.spend)||0,impressions=Number(c.impressions)||0,clicks=Number(c.clicks)||0,leads=Number(c.leads)||0;
    return {...c,spend,impressions,clicks,leads,cpl:leads>0?spend/leads:0,ctr:impressions>0?(clicks/impressions)*100:0,cpc:clicks>0?spend/clicks:0};
  });
}

// ─── Storage ───
async function loadReports() {
  try {
    const keys = await window.storage.list("report:");
    if (keys?.keys?.length) {
      const arr = [];
      for (const k of keys.keys) {
        try { const r = await window.storage.get(k); if(r?.value) arr.push(JSON.parse(r.value)); } catch(e){}
      }
      arr.sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0));
      reports = arr;
    } else { reports = []; }
  } catch(e) { reports = []; }
}

async function saveToStorage(report) {
  const json = JSON.stringify(report);
  try {
    await window.storage.set(`report:${report.id}`, json);
    await window.storage.set(`report:${report.id}`, json, true);
  } catch(e) { console.error("Save error",e); }
}

async function deleteFromStorage(id) {
  try { await window.storage.delete(`report:${id}`); } catch(e){}
  try { await window.storage.delete(`report:${id}`, true); } catch(e){}
}

// ─── Views ───
function showView(name) {
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(`view-${name}`).classList.add('active');
}

async function showList() {
  await loadReports();
  const el = document.getElementById('list-items');
  document.getElementById('list-count').textContent = `${reports.length} relatório${reports.length!==1?'s':''} criado${reports.length!==1?'s':''}`;
  if (!reports.length) {
    el.innerHTML = `<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">📊</div><p style="color:var(--dim);font-size:15px">Nenhum relatório ainda</p><p style="color:var(--faint);font-size:13px;margin-top:4px">Clique em "+ Novo Relatório" para começar</p></div>`;
  } else {
    el.innerHTML = reports.map(r => `
      <div class="list-item">
        <div class="list-info">
          <div class="list-name">${r.accountName||'Sem nome'}</div>
          <div class="list-meta">${r.period||'Sem período'} • ${r.campaigns?.length||0} campanhas</div>
        </div>
        <div class="list-actions">
          <button class="btn btn-sm" style="background:#0a2a18;border:1px solid #0c3a22;color:#6ee7b7" onclick="showShareModal('${r.id}')">📋 Link</button>
          <button class="btn btn-ghost btn-sm" style="color:#7db4fc" onclick="viewReport('${r.id}')">👁️ Ver</button>
          <button class="btn btn-ghost btn-sm" onclick="editReport('${r.id}')">✏️</button>
          <button class="btn btn-sm" style="background:#1a0e0e;border:1px solid #3a1515;color:#f87171" onclick="deleteReport('${r.id}')">🗑️</button>
        </div>
      </div>
    `).join('');
  }
  window.location.hash = '';
  showView('list');
}

// ─── Editor ───
function showEditor(report) {
  editingId = report?.id || null;
  document.getElementById('ed-title').textContent = report ? 'Editar Relatório' : 'Novo Relatório';
  document.getElementById('ed-agency').value = report?.agencyName || '';
  document.getElementById('ed-account').value = report?.accountName || '';
  document.getElementById('ed-period').value = report?.period || '';
  document.getElementById('ed-notes').value = report?.notes || '';
  campaignCount = 0;
  document.getElementById('campaigns-container').innerHTML = '';
  if (report?.campaigns?.length) {
    report.campaigns.forEach(c => addCampaignField(c));
  } else { addCampaignField(); }
  updatePreview();
  showView('editor');
}

function addCampaignField(data) {
  const idx = campaignCount++;
  const div = document.createElement('div');
  div.className = 'camp-card';
  div.id = `camp-${idx}`;
  div.innerHTML = `
    <button class="camp-remove" onclick="removeCampaign(${idx})">×</button>
    <div><label>Nome da Campanha</label><input id="cn-${idx}" value="${data?.name||''}" placeholder="Ex: Seminovos – Leads WhatsApp" oninput="updatePreview()"></div>
    <div class="camp-fields">
      <div><label>Investido (R$)</label><input type="number" step="0.01" id="cs-${idx}" value="${data?.spend||''}" placeholder="0.00" oninput="updatePreview()"></div>
      <div><label>Impressões</label><input type="number" id="ci-${idx}" value="${data?.impressions||''}" placeholder="0" oninput="updatePreview()"></div>
      <div><label>Cliques</label><input type="number" id="cc-${idx}" value="${data?.clicks||''}" placeholder="0" oninput="updatePreview()"></div>
      <div><label>Leads</label><input type="number" id="cl-${idx}" value="${data?.leads||''}" placeholder="0" oninput="updatePreview()"></div>
    </div>
  `;
  document.getElementById('campaigns-container').appendChild(div);
}

function removeCampaign(idx) {
  const el = document.getElementById(`camp-${idx}`);
  if (el && document.querySelectorAll('.camp-card').length > 1) { el.remove(); updatePreview(); }
}

function getCampaignsFromEditor() {
  const camps = [];
  document.querySelectorAll('.camp-card').forEach(card => {
    const id = card.id.split('-')[1];
    const name = document.getElementById(`cn-${id}`)?.value?.trim();
    if (name) {
      camps.push({
        name,
        spend: document.getElementById(`cs-${id}`)?.value || 0,
        impressions: document.getElementById(`ci-${id}`)?.value || 0,
        clicks: document.getElementById(`cc-${id}`)?.value || 0,
        leads: document.getElementById(`cl-${id}`)?.value || 0,
      });
    }
  });
  return camps;
}

function updatePreview() {
  const camps = getCampaignsFromEditor();
  const bar = document.getElementById('preview-bar');
  if (!camps.length) { bar.style.display='none'; return; }
  bar.style.display='block';
  const t = computeTotals(camps);
  document.getElementById('pv-spend').textContent = fmt(t.spend);
  document.getElementById('pv-leads').textContent = t.leads;
  document.getElementById('pv-cpl').textContent = fmt(t.cpl);
  document.getElementById('pv-ctr').textContent = fmtP(t.ctr);
}

async function saveReport() {
  const accountName = document.getElementById('ed-account').value.trim();
  if (!accountName) { alert('Preencha o nome do cliente.'); return; }
  const campaigns = getCampaignsFromEditor();
  if (!campaigns.length) { alert('Preencha pelo menos uma campanha.'); return; }
  const report = {
    id: editingId || uid(),
    agencyName: document.getElementById('ed-agency').value.trim(),
    accountName,
    period: document.getElementById('ed-period').value.trim(),
    notes: document.getElementById('ed-notes').value.trim(),
    campaigns,
    updatedAt: Date.now(),
  };
  await saveToStorage(report);
  await showList();
  showShareModal(report.id);
}

// ─── Report ───
function renderReport(report) {
  const camps = enrichCamps(report.campaigns);
  const t = computeTotals(report.campaigns);
  t.cpl = t.leads>0 ? t.spend/t.leads : 0;
  t.ctr = t.impressions>0 ? (t.clicks/t.impressions)*100 : 0;
  t.cpc = t.clicks>0 ? t.spend/t.clicks : 0;
  const maxLeads = Math.max(...camps.map(c=>c.leads),1);
  const maxCpl = Math.max(...camps.map(c=>c.cpl),0.01);

  const kpis = [
    {label:"Investimento",value:fmt(t.spend),color:"var(--blue)",gc:"var(--blue-g)"},
    {label:"Leads Gerados",value:t.leads,color:"var(--green)",gc:"var(--green-g)"},
    {label:"Custo por Lead",value:fmt(t.cpl),color:"var(--purple)",gc:"var(--purple-g)"},
    {label:"CTR",value:fmtP(t.ctr),color:"var(--amber)",gc:"var(--amber-g)"},
  ];

  document.getElementById('report-content').innerHTML = `
    <div class="rpt-header anim" style="animation-delay:.1s">
      <div class="rpt-badge">Relatório de Performance</div>
      <div class="rpt-title">Meta Ads</div>
      <div class="rpt-account">${report.accountName}</div>
      <div class="rpt-period">${report.period}</div>
      ${report.agencyName ? `<div class="rpt-agency">Gerado por <span>${report.agencyName}</span></div>` : ''}
    </div>

    <div class="kpi-grid">
      ${kpis.map((k,i) => `
        <div class="card kpi anim" style="animation-delay:${.2+i*.1}s;--gc:${k.gc};animation:fadeUp .75s cubic-bezier(.16,1,.3,1) ${.2+i*.1}s forwards,glowBreathe 4s ease-in-out infinite;opacity:0">
          <div class="kpi-label">${k.label}</div>
          <div class="kpi-value" style="color:${k.color};animation:countPop .5s cubic-bezier(.16,1,.3,1) ${.5+i*.1}s both;opacity:0">${k.value}</div>
        </div>
      `).join('')}
    </div>

    <div class="sec-grid">
      ${[{l:"Impressões",v:fmtN(t.impressions)},{l:"Cliques",v:fmtN(t.clicks)},{l:"CPC Médio",v:fmt(t.cpc)}].map((m,i) => `
        <div class="card sec anim" style="animation-delay:${.6+i*.08}s">
          <div class="section-label" style="margin-bottom:6px">${m.l}</div>
          <div class="sec-val">${m.v}</div>
        </div>
      `).join('')}
    </div>

    <div class="tbl anim" style="animation-delay:.8s">
      <div class="tbl-title section-label">Performance por Campanha</div>
      <div class="tbl-inner">
        <div class="trow thead"><span>Campanha</span><span>Investido</span><span>Impressões</span><span>Cliques</span><span>CTR</span><span>Leads</span><span>CPL</span></div>
        ${camps.map((c,i) => `
          <div class="trow" style="animation:slideRow .5s ease-out ${.9+i*.12}s both;opacity:0">
            <span class="camp-name">${c.name}</span>
            <span class="val-b">${fmt(c.spend)}</span>
            <span>${fmtN(c.impressions)}</span>
            <span>${fmtN(c.clicks)}</span>
            <span class="val-a">${fmtP(c.ctr)}</span>
            <span class="val-g">${c.leads}</span>
            <span class="val-p">${fmt(c.cpl)}</span>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="charts-grid">
      <div class="card anim" style="animation-delay:1.1s">
        <div class="section-label" style="margin-bottom:18px">Leads por Campanha</div>
        ${camps.map((c,i) => `
          <div class="bar-sec">
            <div class="bar-hd"><span class="bar-lbl">${c.name.length>28?c.name.slice(0,28)+'…':c.name}</span><span style="font-weight:700;color:var(--green)">${c.leads}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(c.leads/maxLeads*100).toFixed(1)}%;background:linear-gradient(90deg,var(--green),rgba(12,201,138,.4));animation:barGrow 1s cubic-bezier(.16,1,.3,1) ${1.2+i*.15}s forwards"></div></div>
          </div>
        `).join('')}
      </div>
      <div class="card anim" style="animation-delay:1.2s">
        <div class="section-label" style="margin-bottom:18px">CPL por Campanha</div>
        ${camps.map((c,i) => `
          <div class="bar-sec">
            <div class="bar-hd"><span class="bar-lbl">${c.name.length>28?c.name.slice(0,28)+'…':c.name}</span><span style="font-weight:700;color:var(--purple)">${fmt(c.cpl)}</span></div>
            <div class="bar-track"><div class="bar-fill" style="width:${(c.cpl/maxCpl*100).toFixed(1)}%;background:linear-gradient(90deg,var(--purple),rgba(144,97,249,.4));animation:barGrow 1s cubic-bezier(.16,1,.3,1) ${1.4+i*.15}s forwards"></div></div>
          </div>
        `).join('')}
      </div>
    </div>

    ${report.notes ? `
      <div class="card anim" style="animation-delay:1.5s">
        <div class="section-label" style="margin-bottom:12px">Observações</div>
        <div class="rpt-notes">${report.notes}</div>
      </div>
    ` : ''}

    <div class="rpt-footer anim" style="animation-delay:1.6s">
      <div class="rpt-footer-line"></div>
      <p style="font-size:12px;color:var(--faint)">Relatório gerado por <span style="color:var(--blue);font-weight:700">${report.agencyName||'Sua Agência'}</span></p>
      <p style="font-size:11px;color:#1e2940;margin-top:4px">Dados de Meta Ads • ${report.period}</p>
    </div>
  `;
  showView('report');
}

async function viewReport(id) {
  const r = reports.find(x=>x.id===id);
  if (r) { window.location.hash = `report=${id}`; renderReport(r); }
}

function editReport(id) {
  const r = reports.find(x=>x.id===id);
  if (r) showEditor(r);
}

async function deleteReport(id) {
  if (!confirm('Deletar este relatório?')) return;
  await deleteFromStorage(id);
  await showList();
}

// ─── Modal ───
function showShareModal(id) {
  const link = `${window.location.origin}${window.location.pathname}#report=${id}`;
  document.getElementById('modal-link').textContent = link;
  document.getElementById('copy-btn').textContent = '📋 Copiar Link';
  document.getElementById('share-modal').style.display = 'flex';
}

function closeModal() { document.getElementById('share-modal').style.display = 'none'; }

function copyLink() {
  const text = document.getElementById('modal-link').textContent;
  navigator.clipboard.writeText(text);
  document.getElementById('copy-btn').textContent = '✅ Copiado!';
  setTimeout(()=>{ document.getElementById('copy-btn').textContent = '📋 Copiar Link'; },2000);
}

// ─── Init ───
async function init() {
  const hash = window.location.hash;
  const match = hash.match(/report=([a-z0-9]+)/);
  if (match) {
    try {
      const res = await window.storage.get(`report:${match[1]}`, true);
      if (res?.value) { renderReport(JSON.parse(res.value)); return; }
    } catch(e){}
    try {
      const res = await window.storage.get(`report:${match[1]}`);
      if (res?.value) { renderReport(JSON.parse(res.value)); return; }
    } catch(e){}
  }
  await showList();
}
init();
</script>
